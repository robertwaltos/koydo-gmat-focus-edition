name: CI

on:
  # ─── PAUSED 2026-04-17 ──────────────────────────────────────────────
  # All automatic triggers commented out while we resolve current issues.
  # Manual runs via workflow_dispatch (UI / gh workflow run) still work.
  # Re-enable by restoring the original trigger blocks (see git history).
  # ─────────────────────────────────────────────────────────────────────
  # push:
    # branches: [master, main]
  # pull_request:
    # branches: [master, main]

  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auth gate check
        run: |
          if ! grep -q "isPublicRoute" src/middleware.ts; then
            echo "::error::src/middleware.ts is missing auth gate (isPublicRoute check)."
            echo "See docs/ENGINEERING_BLUEPRINT.md for the required pattern."
            exit 1
          fi

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
